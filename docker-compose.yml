name: atelier-vieux

services:
  postgres:
    image: postgres:16-alpine
    container_name: atelier_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vintage_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vintage_shop"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: atelier_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redisdata:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atelier_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/vintage_shop
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3003}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:4003}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_production_32chars!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_32chars_secret!}
      JWT_ACCESS_EXPIRES_IN: 2h
      JWT_REFRESH_EXPIRES_IN: 7d
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:-change_me_pepper_in_production!!!}
      SMTP_HOST: smtp.yandex.ru
      SMTP_PORT: 587
      SMTP_USER: cthulhufollover@yandex.ru
      SMTP_PASS: ywglcycbhilvsjbl
      SMTP_FROM: Ателье Историй <cthulhufollover@yandex.ru>
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ateliervieux.com}
    ports:
      - "4003:4000"
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4003/api}
    container_name: atelier_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3003:80"

volumes:
  pgdata:
  redisdata:
  uploads:
